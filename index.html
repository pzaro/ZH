<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARKOLIA Lab</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004458.png">

    <style>
        /* =========================================
           --- 1. ΓΕΝΙΚΟ ΣΤΥΛ & ΧΡΩΜΑΤΑ (UI/UX) ---
           ========================================= */
        :root {
            --primary: #1e3a8a; 
            --primary-light: #eff6ff;
            --accent: #f59e0b; 
            --accent-hover: #d97706;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --success: #059669;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            padding: 15px; 
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh;
        }
        
        /* --- Login Screen --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%); 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        #loginBox { 
            background: var(--card-bg); padding: 35px 25px; border-radius: 20px; 
            text-align: center; width: 85%; max-width: 320px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); 
        }
        #loginBox h2 { color: var(--primary); margin-top: 0; font-weight: 800; letter-spacing: 1px; }
        #passwordInput { 
            padding: 15px; font-size: 1.5em; width: 100%; box-sizing: border-box; margin-bottom: 20px; 
            border: 2px solid var(--border-color); border-radius: 12px; text-align: center; 
            -webkit-text-security: disc; outline: none; transition: border 0.3s;
        }
        #passwordInput:focus { border-color: var(--primary); }
        #loginBtn { 
            background: var(--accent); color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; 
            transition: transform 0.2s, background 0.3s; box-shadow: 0 4px 6px rgba(245, 158, 11, 0.3);
        }
        #loginBtn:active { transform: scale(0.97); background: var(--accent-hover); }

        /* --- Main App Container --- */
        .container { 
            max-width: 850px; margin: 0 auto; background: var(--card-bg); padding: 25px; 
            border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); display: none; 
        }
        h1 { text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 1.6em; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.9em; margin-bottom: 25px; font-weight: 500; }
        
        /* --- Control Panel --- */
        .control-panel { 
            background: var(--primary-light); padding: 20px; border-radius: 16px; 
            border: 1px solid #bfdbfe; margin-bottom: 25px;
        }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #1e40af; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="number"] { 
            padding: 14px; font-size: 1.1em; border-radius: 12px; border: 2px solid #93c5fd; 
            width: 100%; box-sizing: border-box; font-weight: bold; background: white; 
            color: var(--text-main); outline: none; transition: border 0.2s;
        }
        select:focus, input[type="number"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        
        /* Caps Inputs */
        .caps-panel { background: #fffbeb; padding: 15px; border-radius: 12px; border: 2px solid #fde68a; margin-top: 15px; }
        .caps-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed #fcd34d; padding-bottom: 12px; }
        .caps-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .caps-label { font-weight: 700; color: #b45309; flex: 2; text-align: left; font-size: 0.95em; }
        .caps-input { flex: 1; }
        .caps-input input { padding: 10px; font-size: 1.2em; text-align: center; border-color: #fcd34d; color: #b45309; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        button { 
            flex: 1; min-width: 140px; padding: 16px; font-size: 1em; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; 
            transition: all 0.2s ease; 
        }
        .btn-calc { background-color: var(--primary); color: white; box-shadow: 0 4px 6px rgba(30, 58, 138, 0.2); }
        .btn-calc:hover { background-color: #1e3a8a; transform: translateY(-2px); }
        .btn-print { background-color: #475569; color: white; box-shadow: 0 4px 6px rgba(71, 85, 105, 0.2); }
        .btn-print:hover { background-color: #334155; transform: translateY(-2px); }

        /* Checkboxes */
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .checkbox-wrapper { display: flex; align-items: center; gap: 12px; font-size: 1em; font-weight: 600; cursor: pointer; color: var(--text-main); }
        input[type="checkbox"] { transform: scale(1.4); accent-color: var(--primary); cursor: pointer; }
        .print-label-toggle { color: #c2410c; padding-top: 10px; border-top: 1px solid #f3f4f6; margin-top: 5px; }

        /* =========================================
           --- 2. ΑΠΟΤΕΛΕΣΜΑΤΑ & ΠΙΝΑΚΑΣ (MOBILE-FIT) ---
           ========================================= */
        #resultContainer { margin-top: 30px; display: none; border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .print-doc-header { display: none; }
        
        .recipe-header { background: linear-gradient(to right, #1e3a8a, #3b82f6); color: white; padding: 20px; }
        .recipe-title { font-size: 1.5em; font-weight: 800; display: block; letter-spacing: 0.5px; }
        .recipe-desc { display:block; font-size:0.95em; opacity:0.9; margin-top: 5px; }
        
        .target-info { padding:12px; background:#dbeafe; color:#1e40af; font-weight:800; text-align:center; font-size: 1.1em; border-bottom: 1px solid #bfdbfe; }
        
        .table-wrapper { width: 100%; overflow: hidden; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; table-layout: fixed; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; word-wrap: break-word; }
        th { background: #f8fafc; text-align: left; color: var(--text-muted); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
        
        th:nth-child(1), td:nth-child(1) { width: 8%; text-align: center; } 
        th:nth-child(2), td:nth-child(2) { width: 37%; } 
        th:nth-child(3), td:nth-child(3) { width: 30%; } 
        th:nth-child(4), td:nth-child(4) { width: 25%; text-align: right; } 

        .phase-row td { background: #f1f5f9; color: #334155; font-weight: 800; padding-top: 15px; text-transform: uppercase; font-size: 0.9em; }
        .amount-col { color: var(--success); font-weight: 800; font-size: 1.05em; }
        .pct-label { display: block; font-size: 0.75em; color: var(--text-muted); font-weight: 600; margin-top: 2px; }
        .total-row { background: #ecfdf5; border-top: 2px solid #a7f3d0; }
        .total-row td { color: #065f46; font-weight: 800; font-size: 1.05em; }
        
        .traceability-box { font-size: 0.8em; color: #9ca3af; line-height: 1.8; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: clip;}
        
        .safety-box { background: #fef2f2; color: #b91c1c; padding: 15px; border-left: 5px solid #ef4444; font-size: 0.9em; line-height: 1.5; border-bottom: 1px solid #fecaca; }
        .instructions-box { background: #f0fdf4; color: #166534; padding: 20px; border-top: 1px solid #bbf7d0; }
        .instructions-box strong { display: block; margin-bottom: 10px; font-size: 1.1em; text-transform: uppercase; }
        .instructions-list { padding-left: 20px; margin: 0; }
        .instructions-list li { margin-bottom: 8px; font-size: 0.95em; line-height: 1.5; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            table { font-size: 0.8em; }
            th, td { padding: 8px 4px; }
            .traceability-box { font-size: 0.7em; letter-spacing: -0.5px; }
            .amount-col { font-size: 0.95em; }
            input[type="checkbox"] { transform: scale(1.1); }
        }

        /* --- LABEL PREVIEW --- */
        #labelPreview { display: none; width: 100mm; height: 62mm; margin: 20px auto; box-sizing: border-box; background: white; font-family: Arial, sans-serif; border: 2px dashed #94a3b8; padding: 2mm; border-radius: 8px; }
        .lbl-container { display: flex; width: 100%; height: 100%; border: 3px solid #000; border-radius: 6px; padding: 5px; box-sizing: border-box; }
        .lbl-left { flex: 1.6; display: flex; flex-direction: column; justify-content: space-between; padding-right: 10px; border-right: 2px solid #000; }
        .lbl-right { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-left: 10px; }
        .lbl-header { font-size: 9pt; font-weight: 900; text-transform: uppercase; color: #000; border-bottom: 2px solid #000; padding-bottom: 3px; }
        .lbl-title { font-size: 18pt; font-weight: 900; line-height: 1.1; margin-top: 5px; color: #000; letter-spacing: -0.5px; }
        .lbl-meta { font-size: 8pt; margin-top: auto; color: #000; font-weight: bold; }
        .lbl-data-row { font-size: 10pt; font-weight: bold; margin: 5px 0; width: 100%; text-align: left; color: #000;}
        .lbl-data-val { font-size: 13pt; display: block; font-family: monospace;}
        .pao-icon { width: 38px; height: 38px; margin-top: 10px; }

        /* =========================================
           --- 3. PRINT SETTINGS ---
           ========================================= */
        @media print {
            #loginOverlay, .control-panel, h1, .subtitle { display: none !important; }
            .container { box-shadow: none; border: none; margin: 0; padding: 0; width: 100%; max-width: none; border-radius: 0; }

            body:not(.print-label-mode) #resultContainer { display: block; width: 100%; border: none; box-shadow: none; border-radius: 0; }
            body:not(.print-label-mode) #labelPreview { display: none; }
            body:not(.print-label-mode) { background: white; font-size: 10pt; color: #000; }
            
            @page { size: A4 portrait; margin: 10mm 12mm; }

            body:not(.print-label-mode) table { table-layout: auto; font-size: 9.5pt; }
            body:not(.print-label-mode) th:nth-child(1), body:not(.print-label-mode) td:nth-child(1) { width: 5%; }
            body:not(.print-label-mode) th:nth-child(2), body:not(.print-label-mode) td:nth-child(2) { width: 35%; }
            body:not(.print-label-mode) th:nth-child(3), body:not(.print-label-mode) td:nth-child(3) { width: 40%; }
            body:not(.print-label-mode) th:nth-child(4), body:not(.print-label-mode) td:nth-child(4) { width: 20%; }

            body:not(.print-label-mode) .print-doc-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; font-size: 10pt; color: #000; }
            body:not(.print-label-mode) .recipe-header { background: transparent; color: #000; padding: 0; margin-bottom: 10px; text-align: center; border-bottom: none; }
            body:not(.print-label-mode) .recipe-title { font-size: 16pt; text-transform: uppercase; border-bottom: 2px solid #000; display: inline-block; padding-bottom: 3px; letter-spacing: 0; }
            body:not(.print-label-mode) .recipe-desc { font-weight: bold; }
            body:not(.print-label-mode) .target-info { background: transparent; color: #000; border: 1px solid #000; padding: 5px; font-size: 11pt; margin-bottom: 10px; }
            body:not(.print-label-mode) .safety-box { background: transparent; color: #000; border: 1px solid #000; border-left: 5px solid #000; padding: 5px 8px; margin-bottom: 10px; font-weight: bold; }

            body:not(.print-label-mode) table { border: 1px solid #000; margin-bottom: 15px; }
            body:not(.print-label-mode) th, body:not(.print-label-mode) td { padding: 6px 8px; border-bottom: 1px solid #999; color: #000; white-space: normal;}
            body:not(.print-label-mode) th { background-color: #f0f0f0; border-bottom: 2px solid #000; }
            body:not(.print-label-mode) .phase-row td { background-color: #e5e5e5; font-size: 10pt; border-top: 2px solid #000; border-bottom: 1px solid #000; }
            body:not(.print-label-mode) .traceability-box { color: #000; font-size: 9pt; }
            
            input[type="checkbox"] { -webkit-print-color-adjust: exact; color-adjust: exact; }

            body:not(.print-label-mode) .total-row td { background: transparent; color: #000; border-top: 3px double #000; font-size: 11pt; }
            body:not(.print-label-mode) .pct-label { color: #333; }

            body:not(.print-label-mode) .instructions-box { background: transparent; color: #000; border: 1px solid #000; padding: 8px; page-break-inside: avoid; }
            body:not(.print-label-mode) .instructions-list li { margin-bottom: 3px; }

            body.print-label-mode #resultContainer { display: none !important; }
            body.print-label-mode #labelPreview { display: block !important; position: fixed; top: 0; left: 0; width: 100mm; height: 62mm; border: none; margin: 0; padding: 0; }
            body.print-label-mode @page { size: 100mm 62mm; margin: 0; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div id="loginBox">
        <h2>ZARKOLIA LAB</h2>
        <p style="color:var(--text-muted); margin-bottom:20px; font-weight:600;">Πρόσβαση Εργαστηρίου</p>
        <input type="password" id="passwordInput" placeholder="PIN ή Κωδικός">
        <button id="loginBtn" onclick="checkLogin()">ΕΙΣΟΔΟΣ</button>
    </div>
</div>

<div class="container" id="mainApp">
    <h1>ZARKOLIA LAB</h1>
    <p class="subtitle">Production System v33</p>
    
    <div class="control-panel">
        <label>1. ΕΠΙΛΟΓΗ ΠΡΟΪΟΝΤΟΣ</label>
        <select id="recipeSelect" onchange="toggleInputs()">
            <option value="" disabled selected>-- Επιλέξτε από τη λίστα --</option>
            <optgroup label="Θεραπείες Σώματος & Αναπλαστικές">
                <option value="zplast_classic">ZPLAST CREAM (Classic CPNP Formula)</option>
                <option value="zplast">Zplast Total Repair (Light Version)</option>
                <option value="bruise">Bruise Off (5kg Formula)</option>
                <option value="zplast_heavy">ZPLAST HEAVY (Test 0.5% Cet)</option>
            </optgroup>
            <optgroup label="Συμπληρώματα">
                <option value="zboost">Z-Boost Caps (Ginger/ALA)</option>
            </optgroup>
            <optgroup label="Κρέμες Προσώπου">
                <option value="plus">Revitacell Plus</option>
                <option value="eyes">Revitacell Eyes</option>
                <option value="hydralia">Hydralia Face</option>
            </optgroup>
            <optgroup label="Σιρόπι">
                <option value="syrup_custom">ALVEOLAIR</option>
            </optgroup>
            <optgroup label="Βάσεις">
                <option value="base">Βάση Gel-Cream</option>
            </optgroup>
        </select>

        <div style="margin-top:20px;" id="standardInput">
            <label>2. ΣΤΟΧΟΣ ΠΑΡΑΓΩΓΗΣ (g)</label>
            <input type="number" id="totalWeightInput" value="1000" step="50">
        </div>

        <div style="margin-top:20px; display:none;" id="capsuleInput">
            <label>2. ΥΠΟΛΟΓΙΣΜΟΣ ΚΑΨΟΥΛΩΝ</label>
            <div class="caps-panel">
                <div class="caps-row">
                    <span class="caps-label">💊 ΧΥΜΑ ΚΑΨΟΥΛΕΣ (ΤΜΧ)</span>
                    <div class="caps-input"><input type="number" id="inCapsBulk" placeholder="0"></div>
                </div>
                <div class="caps-row">
                    <span class="caps-label">📦 ΠΑΚΕΤΑ ΤΩΝ 12</span>
                    <div class="caps-input"><input type="number" id="inPacks12" placeholder="0"></div>
                </div>
                <div class="caps-row">
                    <span class="caps-label">📦 ΠΑΚΕΤΑ ΤΩΝ 30</span>
                    <div class="caps-input"><input type="number" id="inPacks30" placeholder="0"></div>
                </div>
            </div>
        </div>
        
        <div class="checkbox-group">
            <div class="checkbox-wrapper">
                <input type="checkbox" id="showInstructions" checked>
                <label for="showInstructions">Εμφάνιση Οδηγιών Παρασκευής</label>
            </div>
            <div class="checkbox-wrapper print-label-toggle">
                <input type="checkbox" id="printLabelMode" onchange="togglePrintMode()">
                <label for="printLabelMode">🖨️ ΛΕΙΤΟΥΡΓΙΑ ΕΤΙΚΕΤΑΣ (Brother 62mm)</label>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-calc" onclick="calculate()">ΥΠΟΛΟΓΙΣΜΟΣ</button>
            <button class="btn-print" onclick="window.print()">ΕΚΤΥΠΩΣΗ</button>
        </div>
    </div>

    <div id="labelPreview">
        <div class="lbl-container">
            <div class="lbl-left">
                <div>
                    <div class="lbl-header">ZARKOLIA LAB</div>
                    <div class="lbl-title" id="lblTitle">PRODUCT NAME</div>
                </div>
                <div class="lbl-meta">
                    Made in Greece<br>Store in a cool dry place
                </div>
            </div>
            <div class="lbl-right">
                <div class="lbl-data-row">LOT:<br><span class="lbl-data-val" id="lblLot">ZXX0000</span></div>
                <div class="lbl-data-row">EXP:<br><span class="lbl-data-val" id="lblExpDate">00/00</span></div>
                <svg class="pao-icon" viewBox="0 0 100 100" fill="none" stroke="black" stroke-width="5">
                    <path d="M15,35 L15,85 Q15,95 25,95 L75,95 Q85,95 85,85 L85,35" fill="none" />
                    <path d="M85,35 L15,35 L10,15 Q50,5 90,15 Z" fill="none" />
                    <text x="50" y="75" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" stroke="none" fill="black" id="paoText">6M</text>
                </svg>
            </div>
        </div>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    // --- SECURITY ---
    const _0x9f2a = "34b35aca37baf7d5d997466dff1ab8ca1dc901df7010f3279138670838e2c9e8"; // Hash for 106014

    async function checkLogin() {
        const input = document.getElementById('passwordInput').value;
        if (!input) return;
        
        const encoder = new TextEncoder();
        const data = encoder.encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        // Accept either the hashed PIN (106014) OR the word "Zelia" / "zelia"
        if (hashHex === _0x9f2a || input.toLowerCase() === 'zelia') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            alert("Λάθος κωδικός");
            document.getElementById('passwordInput').value = "";
        }
    }

    // Επιτρέπει και το πάτημα του "Enter" για είσοδο
    document.getElementById('passwordInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkLogin();
    });

    function togglePrintMode() {
        const isLabel = document.getElementById('printLabelMode').checked;
        if (isLabel) document.body.classList.add('print-label-mode');
        else document.body.classList.remove('print-label-mode');
    }

    // --- FULL RECIPES ---
    const recipes = {
        zplast_classic: {
            title: "ZPLAST CREAM",
            desc: "Classic CPNP Formula",
            initials: "ZC",
            shelfLife: 12,
            type: "standard",
            safetyNote: "Αυθεντική παχύρρευστη φόρμουλα CPNP (16% σκόνες + Βαζελίνη). Προσφέρει άριστη επικάλυψη.",
            ingredients: [
                { name: "--- ΦΑΣΗ Α (ΥΔΑΤΙΚΗ) ---", isHeader: true },
                { name: "Aqua (Νερό)", pct: 0, isQS: true },
                { name: "Magnesium Aluminum Silicate", pct: 2.0 },
                { name: "Xanthan Gum", pct: 0.5 },
                { name: "--- ΦΑΣΗ Β (ΣΚΟΝΕΣ) ---", isHeader: true },
                { name: "Calamine Powder", pct: 8.0 },
                { name: "Zea Mays Starch", pct: 8.0 },
                { name: "--- ΦΑΣΗ Γ (ΛΙΠΑΡΗ - 75°C) ---", isHeader: true },
                { name: "C12-20 Acid PEG-8 Ester (Xalifin-15)", pct: 6.0 },
                { name: "Petrolatum (Βαζελίνη)", pct: 6.0 },
                { name: "Cetyl Alcohol", pct: 1.0 },
                { name: "Linum Usitatissimum Oil", pct: 2.0 },
                { name: "Persea Gratissima (Avocado) Oil", pct: 2.0 },
                { name: "Hypericum Perforatum Oil", pct: 2.0 },
                { name: "Arnica Montana Flower Oil", pct: 2.0 },
                { name: "--- ΦΑΣΗ Δ (ΕΝΕΡΓΑ <40°C) ---", isHeader: true },
                { name: "Thymus Vulgaris Extract", pct: 2.0 },
                { name: "Hippophae Rhamnoides Extract", pct: 2.0 },
                { name: "Pistacia Lentiscus (Mastic) Extract/Gum", pct: 2.0 },
                { name: "Honey Extract", pct: 0.5 },
                { name: "Alcohol", pct: 2.0 },
                { name: "Phenoxyethanol/Caprylyl Glycol/Ethylhexylglycerin", pct: 1.0 }

    function toggleInputs() {
        const key = document.getElementById('recipeSelect').value;
        const isCap = recipes[key]?.type === 'capsule';
        document.getElementById('standardInput').style.display = isCap ? 'none' : 'block';
        document.getElementById('capsuleInput').style.display = isCap ? 'block' : 'none';
        document.getElementById('resultContainer').style.display = 'none';
    }

    function calculate() {
        const key = document.getElementById('recipeSelect').value;
        if (!key) return alert("Επιλέξτε προϊόν από τη λίστα.");
        const recipe = recipes[key];
        
        let weight = 0, info="";
        
        // --- CAPSULE LOGIC ---
        if (recipe.type === 'capsule') {
            const bulk = parseFloat(document.getElementById('inCapsBulk').value) || 0;
            const p12 = parseFloat(document.getElementById('inPacks12').value) || 0;
            const p30 = parseFloat(document.getElementById('inPacks30').value) || 0;
            
            const totalCaps = bulk + (p12 * 12) + (p30 * 30);
            if (totalCaps <= 0) return alert("Παρακαλώ εισάγετε αριθμό καψουλών (Χύμα ή Πακέτα).");
            
            weight = totalCaps * recipe.capsuleContentWeight;
            info = `ΣΤΟΧΟΣ: ${totalCaps} Κάψουλες (${bulk} χύμα + ${p12}x12 + ${p30}x30)`;
        } else {
            weight = parseFloat(document.getElementById('totalWeightInput').value);
            if (!weight || weight <= 0) return alert("Λάθος ποσότητα.");
            info = `ΣΤΟΧΟΣ ΠΑΡΑΓΩΓΗΣ: ${weight} γραμμάρια`;
        }

        // --- DATES & LOT ---
        const now = new Date();
        const exp = new Date();
        const shelfMonths = recipe.shelfLife || 12;
        exp.setMonth(exp.getMonth() + shelfMonths);
        
        const pad = (n) => String(n).padStart(2, '0');
        const printDate = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} - ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        
        const monthStr = pad(now.getMonth() + 1);
        const yearStr = now.getFullYear();
        const lotNo = "Z" + (recipe.initials || "XX") + monthStr + yearStr;
        const expStr = monthStr + "/" + yearStr; 
        
        // Populate Label
        document.getElementById('lblTitle').innerText = recipe.title;
        document.getElementById('lblLot').innerText = lotNo;
        document.getElementById('lblExpDate').innerText = expStr;
        document.getElementById('paoText').innerText = shelfMonths + "M";

        // --- HTML RENDER (A4 GMP Worksheet) ---
        let html = `
            <div class="print-doc-header">
                <span>ZARKOLIA LAB - GMP ΦΥΛΛΟ ΠΑΡΑΓΩΓΗΣ</span>
                <span>Ημ/νία: ${printDate}</span>
            </div>
            
            <div class="recipe-header">
                <span class="recipe-title">${recipe.title}</span>
                <span class="recipe-desc">${recipe.desc} | Batch: ${lotNo}</span>
            </div>
            
            ${recipe.safetyNote ? `<div class="safety-box">⚠️ <strong>ΠΡΟΣΟΧΗ:</strong> ${recipe.safetyNote}</div>` : ''}
            
            <div class="target-info">${info}</div>
            
            <div class="table-wrapper">
                <table>
                    <tr>
                        <th style="text-align:center;">✔</th>
                        <th>ΣΥΣΤΑΤΙΚΟ</th>
                        <th>IXNHΛΑΣΙΜΟΤΗΤΑ</th>
                        <th style="text-align:right">ΠΟΣΟΤΗΤΑ</th>
                    </tr>
        `;

        let sumPct = 0;
        recipe.ingredients.forEach(i => { if(!i.isQS && !i.isHeader) sumPct += i.pct; });

        recipe.ingredients.forEach(i => {
            if (i.isHeader) {
                html += `<tr class="phase-row"><td colspan="4">${i.name}</td></tr>`;
            } else {
                let finalPct = i.isQS ? Math.max(0, 100 - sumPct) : i.pct;
                let amt = (finalPct / 100) * weight;
                let noteStr = i.note ? ` <br><small style="color:var(--text-muted);">(${i.note})</small>` : '';
                
                html += `<tr>
                    <td style="text-align:center;"><input type="checkbox"></td>
                    <td><strong>${i.name}</strong>${noteStr}</td>
                    <td class="traceability-box">
                        Lot: ___________<br>
                        Exp: __/__/_____
                    </td>
                    <td class="amount-col">
                        ${amt.toFixed(2)} g
                        <span class="pct-label">(${finalPct.toFixed(2)}%)</span>
                    </td>
                </tr>`;
            }
        });

        html += `
                <tr class="total-row">
                    <td colspan="3" style="text-align:right;">ΣΥΝΟΛΟ:</td>
                    <td style="text-align:right">
                        ${weight.toFixed(1)} g
                        <span class="pct-label">(100.00%)</span>
                    </td>
                </tr>
            </table>
        </div>`;

        if (document.getElementById('showInstructions').checked && recipe.instructions) {
            html += `
                <div class="instructions-box">
                    <strong>ΟΔΗΓΙΕΣ ΠΑΡΑΣΚΕΥΗΣ:</strong>
                    <ul class="instructions-list">${recipe.instructions.map(s=>`<li>${s}</li>`).join('')}</ul>
                </div>`;
        }

        const res = document.getElementById('resultContainer');
        res.innerHTML = html;
        res.style.display = 'block';
        togglePrintMode();
    }
</script>
