        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; padding: 15px; color: #333; margin: 0; }

        #loginBox { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #passwordInput { padding: 15px; font-size: 1.2em; width: 100%; box-sizing: border-box; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; text-align: center; -webkit-text-security: disc;}
        #loginBtn { background: #ff5722; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        
        /* App Container */

        p.subtitle { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        
        .control-panel { background: #e8eaf6; padding: 20px; border-radius: 12px; border: 1px solid #c5cae9; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #3f51b5; }
        select, input[type="number"] { padding: 15px; font-size: 1.1em; border-radius: 10px; border: 2px solid #3f51b5; width: 100%; box-sizing: border-box; font-weight: bold; background: white; }
        
        /* Caps Inputs */
        .caps-panel { background: #fff3e0; padding: 15px; border-radius: 10px; border: 2px solid #ffb74d; margin-top: 15px; }
        .caps-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #ffe0b2; padding-bottom: 10px; }
        .caps-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .caps-label { font-weight: bold; color: #e65100; flex: 2; text-align: left; font-size: 0.9em; }
        .caps-input { flex: 1; }
        .caps-input input { padding: 8px; font-size: 1.1em; text-align: center; border-color: #ff9800; }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 15px; font-size: 1em; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-calc { background-color: #3f51b5; color: white; }
        .btn-print { background-color: #546e7a; color: white; }

        .checkbox-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; align-items: center; background: white; padding: 10px; border-radius: 8px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; font-size: 1em; cursor: pointer; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }

        /* Results (Screen) */
        #resultContainer { margin-top: 30px; display: none; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .print-doc-header { display: none; }
        
        .recipe-header { background-color: #263238; color: white; padding: 15px; }
        .recipe-title { font-size: 1.4em; font-weight: bold; display: block; }
        .recipe-desc { display:block; font-size:0.9em; opacity:0.8; }
        
        .target-info { padding:10px; background:#e3f2fd; color:#0d47a1; font-weight:bold; text-align:center; font-size: 1.1em; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background: #f5f5f5; text-align: left;}
        .phase-row td { background: #eceff1; color: #455a64; font-weight: bold; padding-top: 15px; text-transform: uppercase; }
        .amount-col { text-align: right; color: #2e7d32; font-weight: bold; font-size: 1.1em; }
        .pct-label { display: block; font-size: 0.75em; color: #666; font-weight: normal; margin-top: 2px; }
        .total-row { background: #e8f5e9; font-weight: bold; color: #1b5e20; }
        
        .traceability-box { font-size: 0.85em; color: #666; line-height: 1.6; }
        
        .safety-box { background: #fff3e0; color: #bf360c; padding: 15px; border-left: 5px solid #ff5722; font-size: 0.9em; line-height: 1.4; }

        /* --- LABEL PREVIEW (100x62 Landscape) --- */
        #labelPreview { 
            display: none; width: 100mm; height: 62mm; margin: 20px auto; box-sizing: border-box; background: white; font-family: Arial, sans-serif; border: 1px dashed #ccc; padding: 2mm;
        }
        .lbl-container { display: flex; width: 100%; height: 100%; border: 2px solid black; border-radius: 5px; padding: 5px; box-sizing: border-box; }
        .lbl-left { flex: 1.5; display: flex; flex-direction: column; justify-content: space-between; padding-right: 10px; border-right: 1px solid #ccc; }
        .lbl-right { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-left: 10px; }
        .lbl-header { font-size: 9pt; font-weight: bold; text-transform: uppercase; color: #555; }
        .lbl-title { font-size: 18pt; font-weight: 900; line-height: 1.1; margin-top: 5px; }
        .lbl-meta { font-size: 8pt; margin-top: auto; color: #333; }
        .lbl-data-row { font-size: 10pt; font-weight: bold; margin: 4px 0; width: 100%; text-align: left;}
        .lbl-data-val { font-size: 12pt; display: block;}
        .pao-icon { width: 35px; height: 35px; margin-top: 10px; }

        /* =========================================
           --- PRINT SETTINGS (GMP A4 & LABEL) ---
           ========================================= */
        @media print {
            #loginOverlay, .control-panel, h1, .subtitle { display: none !important; }
            .container { box-shadow: none; border: none; margin: 0; padding: 0; width: 100%; max-width: none; }

            /* --- A4 GMP WORKSHEET --- */
            body:not(.print-label-mode) #resultContainer { display: block; width: 100%; border: none; }
            body:not(.print-label-mode) #labelPreview { display: none; }
            body:not(.print-label-mode) { background: white; font-size: 10pt; color: #000; }
            
            @page { size: A4 portrait; margin: 10mm 12mm; }

            /* Header */
            body:not(.print-label-mode) .print-doc-header {
                display: flex; justify-content: space-between; border-bottom: 2px solid #333; 
                padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; font-size: 10pt; color: #000;
            }
            
            body:not(.print-label-mode) .recipe-header { background: transparent; color: #000; padding: 0; margin-bottom: 10px; text-align: center; }
            body:not(.print-label-mode) .recipe-title { font-size: 16pt; text-transform: uppercase; border-bottom: 1px solid #ccc; display: inline-block; padding-bottom: 3px; }
            
            body:not(.print-label-mode) .target-info { background: transparent; color: #000; border: 1px solid #666; padding: 5px; font-size: 10.5pt; margin-bottom: 10px; }
            body:not(.print-label-mode) .safety-box { background: transparent; color: #000; border: 1px solid #000; border-left: 5px solid #000; padding: 5px 8px; margin-bottom: 10px; font-weight: bold; }

            /* Table Formatting for Print */
            body:not(.print-label-mode) table { border: 1px solid #000; margin-bottom: 15px; }
            body:not(.print-label-mode) th, body:not(.print-label-mode) td { padding: 5px 8px; border-bottom: 1px solid #999; }
            body:not(.print-label-mode) th { background-color: #f0f0f0; border-bottom: 2px solid #000; color: #000; }
            body:not(.print-label-mode) .phase-row td { background-color: #e0e0e0; font-size: 10pt; border-top: 2px solid #000; border-bottom: 1px solid #000; }
            
            /* Traceability Dotted Lines */
            body:not(.print-label-mode) .traceability-box { color: #000; font-size: 9pt; }
            
            /* Ensure checkboxes print */
            input[type="checkbox"] { -webkit-print-color-adjust: exact; color-adjust: exact; }

            body:not(.print-label-mode) .pct-label { color: #555; }

            body:not(.print-label-mode) .instructions-box { background: transparent; color: #000; border: 1px solid #000; padding: 8px; page-break-inside: avoid; }
            body:not(.print-label-mode) .instructions-list li { margin-bottom: 3px; }

            body.print-label-mode #resultContainer { display: none !important; }

            }
            body.print-label-mode @page { size: 100mm 62mm; margin: 0; }

                { name: "Aqua", pct: 0, isQS: true }, 
                { name: "Sodium Benzoate", pct: 0.10 }, 
                { name: "--- MIX BΑΜΜΑΤΩΝ (5%) ---", isHeader: true }, 
                { name: "Βάμμα Αλθαίας", pct: 2.10 }, 
                { name: "Βάμμα Θυμαριού", pct: 0.79 }, 
                { name: "Βάμμα Ευκαλύπτου", pct: 0.79 }, 
                { name: "Βάμμα Κράνι", pct: 0.79 }, 
                { name: "Βάμμα Ιπποφαές", pct: 0.79 }, 
                { name: "--- ΥΠΟΛΟΙΠΑ ---", isHeader: true }, 
                { name: "Vit C & Lemon EO", pct: 0.15 }, 
                { name: "Lemon Juice", pct: 0, note: "q.s. για ρύθμιση pH" } 
            ], 
            instructions: ["1. Ζέσταμα νερού (70°C).", "2. Προσθήκη λεμονιού και διάλυση σακχάρου.", "3. Προσθήκη βαμμάτων <40°C.", "4. Έλεγχος pH < 4.5."] 
        },
        eyes: { 
            title: "REVITACELL EYES", desc: "Safe 8% Arnica", initials: "RE", shelfLife: 12, type: "standard", 
            ingredients: [ { name: "Βάση Gel-Cream", pct: 0, isQS: true }, { name: "Arnica Oil", pct: 8.0 }, { name: "Jojoba Oil", pct: 1.0 }, { name: "Almond Oil", pct: 1.0 }, { name: "Hyaluronic Acid 1%", pct: 4.0 }, { name: "Glycerin", pct: 2.0 }, { name: "Aesculus Hippocastanum", pct: 2.0 }, { name: "Parfum", pct: 0.2 } ], 
            instructions: ["1. Μίξη λαδιών ξεχωριστά.", "2. Προσθήκη υδατικών στο λάδι.", "3. Ενσωμάτωση στη βάση."] 
        },
        base: { 
            title: "BASE GEL-CREAM", desc: "Base Formula", initials: "BG", shelfLife: 12, type: "standard", 
            ingredients: [ { name: "Aqua", pct: 0, isQS: true }, { name: "Glycerin", pct: 4.0 }, { name: "Hyaluronic Pw", pct: 0.2 }, { name: "Carbomer", pct: 0.25 }, { name: "Cetearyl Alcohol", pct: 2.0 }, { name: "Stearic Acid", pct: 1.0 }, { name: "IPM", pct: 2.0 }, { name: "Methyl Paraben", pct: 0.2 }, { name: "Propyl Paraben", pct: 0.1 }, { name: "Vit E", pct: 0.5 }, { name: "TEA", pct: 0.25 } ], 
            instructions: ["1. Ενυδάτωση Carbomer στο νερό.", "2. Θέρμανση φάσεων στους 75°C.", "3. Ανάμειξη και εξουδετέρωση με TEA."] 
        }
    };

    function toggleInputs() {
        const key = document.getElementById('recipeSelect').value;
        const isCap = recipes[key]?.type === 'capsule';
        document.getElementById('standardInput').style.display = isCap ? 'none' : 'block';
        document.getElementById('capsuleInput').style.display = isCap ? 'block' : 'none';
        document.getElementById('resultContainer').style.display = 'none';
    }

    function calculate() {
        const key = document.getElementById('recipeSelect').value;
        if (!key) return alert("Επιλέξτε προϊόν");
        const recipe = recipes[key];
        
        let weight = 0, info="";
        
        // --- CAPSULE LOGIC ---
        if (recipe.type === 'capsule') {
            const bulk = parseFloat(document.getElementById('inCapsBulk').value) || 0;
            const p12 = parseFloat(document.getElementById('inPacks12').value) || 0;
            const p30 = parseFloat(document.getElementById('inPacks30').value) || 0;
            
            const totalCaps = bulk + (p12 * 12) + (p30 * 30);
            if (totalCaps <= 0) return alert("Παρακαλώ εισάγετε αριθμό καψουλών.");
            
            weight = totalCaps * recipe.capsuleContentWeight;
            info = `ΣΤΟΧΟΣ ΠΑΡΑΓΩΓΗΣ: ${totalCaps} Κάψουλες (${bulk} χύμα + ${p12} κουτιά x12 + ${p30} κουτιά x30)`;
        } else {
            weight = parseFloat(document.getElementById('totalWeightInput').value);
            if (!weight || weight <= 0) return alert("Λάθος ποσότητα");
            info = `ΣΤΟΧΟΣ ΠΑΡΑΓΩΓΗΣ: ${weight} γραμμάρια`;
        }

        // --- DATES & LOT ---
        const now = new Date();
        const exp = new Date();
        const shelfMonths = recipe.shelfLife || 12;
        exp.setMonth(exp.getMonth() + shelfMonths);
        
        const pad = (n) => String(n).padStart(2, '0');
        const printDate = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} - ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        
        const monthStr = pad(now.getMonth() + 1);
        const yearStr = now.getFullYear();
        const lotNo = "Z" + (recipe.initials || "XX") + monthStr + yearStr;
        const expStr = monthStr + "/" + yearStr; 
        
        // Populate Label
        document.getElementById('lblTitle').innerText = recipe.title;
        document.getElementById('lblLot').innerText = lotNo;
        document.getElementById('lblExpDate').innerText = expStr;
        document.getElementById('paoText').innerText = shelfMonths + "M";

        // --- HTML RENDER (A4 GMP Worksheet) ---
        let html = `
            <div class="print-doc-header">
                <span>ZARKOLIA LAB - GMP ΦΥΛΛΟ ΠΑΡΑΓΩΓΗΣ</span>
                <span>Ημ/νία: ${printDate}</span>
            </div>
            
            <div class="recipe-header">
                <span class="recipe-title">${recipe.title}</span>
                <span class="recipe-desc">${recipe.desc} | Batch: ${lotNo}</span>
            </div>
            
            ${recipe.safetyNote ? `<div class="safety-box">⚠️ <strong>ΠΡΟΣΟΧΗ:</strong> ${recipe.safetyNote}</div>` : ''}
            
            <div class="target-info">${info}</div>
            
            <table>
                <tr>
                    <th width="5%" style="text-align:center;">✔</th>
                    <th width="35%">ΣΥΣΤΑΤΙΚΟ</th>
                    <th width="40%">IXNHΛΑΣΙΜΟΤΗΤΑ (Raw Mat.)</th>
                    <th width="20%" style="text-align:right">ΠΟΣΟΤΗΤΑ (%)</th>
                </tr>
        `;

        let sumPct = 0;
        recipe.ingredients.forEach(i => { if(!i.isQS && !i.isHeader) sumPct += i.pct; });

        recipe.ingredients.forEach(i => {
            if (i.isHeader) {
                html += `<tr class="phase-row"><td colspan="4">${i.name}</td></tr>`;
            } else {
                let finalPct = i.isQS ? Math.max(0, 100 - sumPct) : i.pct;
                let amt = (finalPct / 100) * weight;
                let noteStr = i.note ? ` <br><small style="color:#666;">(${i.note})</small>` : '';
                
                html += `<tr>
                    <td style="text-align:center;"><input type="checkbox"></td>
                    <td><strong>${i.name}</strong>${noteStr}</td>
                    <td class="traceability-box">
                        Lot: ....................................<br>
                        Exp: ......./......./...................
                    </td>
                    <td class="amount-col">
                        ${amt.toFixed(2)} g
                        <span class="pct-label">(${finalPct.toFixed(2)}%)</span>
                    </td>
                </tr>`;
            }
        });

        html += `
            <tr class="total-row">
                <td colspan="3" style="text-align:right;">ΣΥΝΟΛΟ ΜΙΓΜΑΤΟΣ</td>
                <td style="text-align:right">
                    ${weight.toFixed(1)} g
                    <span class="pct-label">(100.00%)</span>
                </td>
            </tr>
        </table>`;

        if (document.getElementById('showInstructions').checked && recipe.instructions) {
            html += `
                <div class="instructions-box">
                    <strong>ΟΔΗΓΙΕΣ ΠΑΡΑΣΚΕΥΗΣ:</strong>
                    <ul class="instructions-list">${recipe.instructions.map(s=>`<li>${s}</li>`).join('')}</ul>
                </div>`;
        }

        const res = document.getElementById('resultContainer');
        res.innerHTML = html;
        res.style.display = 'block';
        togglePrintMode();
    }
</script>
